<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="320" cy="180" r="60" fill="#FFD700"/>
  <g stroke="#FFD700" stroke-width="8" stroke-linecap="round">
    <line x1="320" y1="90" x2="320" y2="60"/>
    <line x1="320" y1="270" x2="320" y2="300"/>
    <line x1="410" y1="180" x2="440" y2="180"/>
    <line x1="230" y1="180" x2="200" y2="180"/>
    <line x1="383" y1="117" x2="404" y2="96"/>
    <line x1="257" y1="243" x2="236" y2="264"/>
    <line x1="383" y1="243" x2="404" y2="264"/>
    <line x1="257" y1="117" x2="236" y2="96"/>
  </g>
  
  <!-- Cloud -->
  <g fill="#FFFFFF">
    <ellipse cx="200" cy="280" rx="80" ry="50"/>
    <ellipse cx="260" cy="260" rx="70" ry="45"/>
    <ellipse cx="140" cy="260" rx="60" ry="40"/>
    <ellipse cx="200" cy="240" rx="65" ry="42"/>
  </g>
  
  <!-- Rain drops (optional, subtle) -->
  <g fill="#87CEEB" opacity="0.6">
    <ellipse cx="160" cy="330" rx="4" ry="12"/>
    <ellipse cx="200" cy="340" rx="4" ry="12"/>
    <ellipse cx="240" cy="330" rx="4" ry="12"/>
  </g>
</svg>
