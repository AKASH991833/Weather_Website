<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate PWA Icons</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      min-height: 100vh;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    h1 { margin-top: 0; }
    .btn {
      background: white;
      color: #667eea;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 10px 5px;
    }
    .btn:hover { opacity: 0.9; }
    .icon-preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .icon-item {
      background: white;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      color: #333;
    }
    .icon-item img {
      width: 100%;
      height: auto;
    }
    .icon-item span {
      display: block;
      font-size: 12px;
      margin-top: 5px;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
    }
    .success { background: rgba(76, 175, 80, 0.3); }
    .error { background: rgba(244, 67, 54, 0.3); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌤️ PWA Icon Generator</h1>
    <p>Click the button below to generate all required PWA icon sizes.</p>
    
    <button class="btn" onclick="generateIcons()">🎨 Generate Icons</button>
    <button class="btn" onclick="downloadAll()">📥 Download All</button>
    
    <div id="preview" class="icon-preview"></div>
    <div id="status" class="status" style="display:none;"></div>
  </div>

  <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
    const generatedIcons = {};

    async function generateIcons() {
      const status = document.getElementById('status');
      const preview = document.getElementById('preview');
      preview.innerHTML = '';
      
      try {
        // Fetch the SVG
        const response = await fetch('icons/icon.svg');
        const svgText = await response.text();
        
        for (const size of sizes) {
          // Create canvas
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          
          // Create image from SVG
          const img = new Image();
          const svgBlob = new Blob([svgText], { type: 'image/svg+xml' });
          const url = URL.createObjectURL(svgBlob);
          
          await new Promise((resolve) => {
            img.onload = () => {
              ctx.drawImage(img, 0, 0, size, size);
              URL.revokeObjectURL(url);
              resolve();
            };
            img.src = url;
          });
          
          // Convert to PNG
          const pngDataUrl = canvas.toDataURL('image/png');
          generatedIcons[size] = pngDataUrl;
          
          // Show preview
          const item = document.createElement('div');
          item.className = 'icon-item';
          item.innerHTML = `
            <img src="${pngDataUrl}" alt="${size}x${size}">
            <span>${size}x${size}</span>
          `;
          preview.appendChild(item);
        }
        
        status.textContent = '✅ All icons generated successfully!';
        status.className = 'status success';
        status.style.display = 'block';
        
      } catch (error) {
        status.textContent = '❌ Error generating icons: ' + error.message;
        status.className = 'status error';
        status.style.display = 'block';
      }
    }

    async function downloadAll() {
      if (Object.keys(generatedIcons).length === 0) {
        alert('Please generate icons first!');
        return;
      }

      // Create JSZip instance (load from CDN)
      const JSZip = await loadScript('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
      const zip = new JSZip();
      
      for (const [size, dataUrl] of Object.entries(generatedIcons)) {
        const base64Data = dataUrl.split(',')[1];
        zip.file(`icon-${size}x${size}.png`, base64Data, { base64: true });
      }
      
      const content = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(content);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'pwa-icons.zip';
      a.click();
      URL.revokeObjectURL(url);
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (window.JSZip) {
          resolve(window.JSZip);
          return;
        }
        const script = document.createElement('script');
        script.src = src;
        script.onload = () => resolve(window.JSZip);
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }
  </script>
</body>
</html>
