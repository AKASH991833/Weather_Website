services:
  - type: web
    name: weathernow-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/proxy-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: OPENWEATHER_API_KEY
        sync: false # You will set this in Render Dashboard
      - key: CACHE_TTL
        value: 600
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: CORS_ALLOWED_ORIGINS
        value: "https://weathernow-app.onrender.com" # Update this with your actual URL after deployment
